<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>FlixCr Pro - Ultra Shield</title>
  <style>
    :root { --bg: #000; --accent: #00a2ff; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #main-app { display: flex; flex-direction: column; height: 100vh; }
    
    /* Contenedor con escudo */
    #video-container { 
      flex: 1; 
      background: #000; 
      position: relative;
      overflow: hidden;
    }

    /* El Iframe se escala un 2% para "empujar" anuncios de borde fuera de la pantalla */
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      background: #000;
      transform: scale(1.02);
    }

    #controls { 
      background: #0f1117; 
      padding: 15px; 
      border-top: 1px solid #222; 
      display: flex; 
      gap: 10px; 
      z-index: 100; 
    }

    select { 
      flex: 1; 
      background: #1a1d24; 
      color: #fff; 
      border: 1px solid #333; 
      padding: 12px; 
      border-radius: 6px; 
      font-size: 1rem;
      outline: none;
    }

    button { 
      background: var(--accent); 
      color: #fff; 
      border: none; 
      padding: 0 30px; 
      border-radius: 6px; 
      font-weight: bold; 
      cursor: pointer;
      box-shadow: 0 4px 0 #007acc;
    }
    
    button:active { transform: translateY(2px); box-shadow: none; }

    #status { 
      position: absolute; 
      bottom: 80px; 
      left: 10px; 
      font-size: 11px; 
      color: #00ff00; 
      z-index: 110; 
      background: rgba(0,0,0,0.8); 
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="main-app">
  <div id="video-container">
    <div id="status">ESCUDO ACTIVADO</div>
    <iframe id="main-player" 
            allow="autoplay; fullscreen; encrypted-media" 
            sandbox="allow-scripts allow-same-origin allow-forms"
            src="about:blank"></iframe>
  </div>

  <div id="controls">
    <select id="canal-select">
      <option value="https://la14hd.com/vivo/canal.php?stream=dsports">DIRECTV SPORTS (Servidor 1)</option>
      <option value="https://elcanaldeportivo.com/directvsports.php">DIRECTV SPORTS (Servidor 2)</option>
      <option value="https://la14hd.com/vivo/canal.php?stream=tyc">TYC SPORTS (Oficial)</option>
      <option value="https://la14hd.com/vivo/canal.php?stream=espnpremium">ESPN PREMIUM</option>
      <option value="https://la14hd.com/vivo/canal.php?stream=foxsports2">FOX SPORTS 2</option>
    </select>
    <button onclick="reproducir()">CARGAR</button>
  </div>
</div>

<script>
  const player = document.getElementById('main-player');
  const status = document.getElementById('status');

  function reproducir() {
    const url = document.getElementById('canal-select').value;
    status.innerText = "BLOQUEANDO PUBLICIDAD... ESPERE";
    
    // Limpieza total antes de cargar
    player.src = "about:blank";
    
    setTimeout(() => {
      player.src = url;
      status.innerText = "SEÑAL LISTA. Presiona OK dos veces si hay un cartel.";
    }, 300);
  }
</script>
</body>
</html>
