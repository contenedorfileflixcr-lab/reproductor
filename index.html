<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Señal Directa</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; }
        .btn-group { margin: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button { padding: 12px 20px; background: #222; color: #fff; border: 1px solid #444; cursor: pointer; border-radius: 5px; }
        button:hover { background: #444; }
        #status { color: #ffcc00; font-weight: bold; margin: 15px; }
        .video-js { margin: 0 auto; width: 80%; max-width: 900px; }
    </style>
</head>
<body>

    <h2>⚡ Buscador de M3U8 en Tiempo Real</h2>
    <div id="status">Selecciona un canal para iniciar la búsqueda...</div>

    <div class="btn-group">
        <button onclick="buscarYReproducir('https://librefutboltv.su/home1/directv-sports/')">DIRECTV SPORTS</button>
        <button onclick="buscarYReproducir('https://librefutboltv.su/home1/tudn/')">TUDN</button>
        <button onclick="buscarYReproducir('https://librefutboltv.su/home1/fox-sports/')">FOX SPORTS</button>
        <button onclick="buscarYReproducir('https://librefutboltv.su/home1/espn-premium/')">ESPN PREMIUM</button>
        <button onclick="buscarYReproducir('https://librefutboltv.su/home1/tyc-sports/')">TYC SPORTS</button>
    </div>

    <video id="reproductor" class="video-js vjs-16-9 vjs-big-play-centered" controls preload="auto"></video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('reproductor');
        const status = document.getElementById('status');

        async function buscarYReproducir(urlLibreFutbol) {
            status.innerText = "🔍 Entrando a la web y buscando link m3u8...";
            player.pause();

            // Usamos AllOrigins pero con un parámetro para forzar la lectura del contenido
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(urlLibreFutbol)}&timestamp=${new Date().getTime()}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const htmlContenido = data.contents;

                // Aplicamos la misma lógica del script original: buscar el patrón del link .m3u8
                // Buscamos algo que empiece por http y termine en .m3u8
                const regexM3U8 = /(https?:\/\/[^"']+\.m3u8[^"']*)/;
                const match = htmlContenido.match(regexM3U8);

                if (match) {
                    let m3u8Final = match[0].replace(/\\/g, ""); // Limpiamos barras escapadas
                    status.innerText = "✅ ¡Link encontrado! Conectando señal...";
                    
                    player.src({
                        type: 'application/x-mpegURL',
                        src: m3u8Final
                    });
                    
                    player.play().catch(e => {
                        status.innerText = "⚠️ Link encontrado pero el reproductor fue bloqueado. Intenta de nuevo.";
                    });
                } else {
                    status.innerText = "❌ No se encontró ningún link m3u8 dentro de la página.";
                    console.log("HTML revisado:", htmlContenido.substring(0, 500)); // Log para depurar
                }
            } catch (error) {
                status.innerText = "❌ Error al intentar acceder a la web puente.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
