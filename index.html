<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Player TV</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 10px; }
        .menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }
        button { background: #222; color: #eee; border: 1px solid #444; padding: 12px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button.active { background: #ff0000; border-color: #ff0000; }
        .video-js { margin: 0 auto; border: 2px solid #333; }
        #log { font-size: 12px; color: #888; margin-top: 10px; background: #111; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="menu">
        <button onclick="cargar('https://librefutboltv.su/home1/directv-sports/', this)">DIRECTV</button>
        <button onclick="cargar('https://librefutboltv.su/home1/tudn/', this)">TUDN</button>
        <button onclick="cargar('https://librefutboltv.su/home1/fox-sports/', this)">FOX SPORTS</button>
        <button onclick="cargar('https://librefutboltv.su/home1/espn-premium/', this)">ESPN+</button>
        <button onclick="cargar('https://librefutboltv.su/home1/tyc-sports/', this)">TYC SPORTS</button>
    </div>

    <video id="hls-player" class="video-js vjs-16-9 vjs-big-play-centered" controls preload="auto"></video>
    
    <div id="log">Estado: Esperando selección...</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    const player = videojs('hls-player');
    const log = document.getElementById('log');

    async function cargar(webUrl, btn) {
        // Estética de botones
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        log.innerText = "🔄 Conectando con la fuente...";
        player.pause();

        // Lista de puentes CORS para intentar si uno falla
        const proxies = [
            "https://api.allorigins.win/get?url=",
            "https://corsproxy.io/?"
        ];

        let exito = false;

        for (let proxy of proxies) {
            try {
                const finalUrl = proxy + encodeURIComponent(webUrl);
                const resp = await fetch(finalUrl);
                const html = proxy.includes("allorigins") ? (await resp.json()).contents : await resp.text();
                
                // Expresión regular mejorada para capturar el link m3u8
                const regex = /(https?:\/\/[^"']+\.m3u8[^"']*)/;
                const match = html.match(regex);

                if (match) {
                    let streamUrl = match[1];
                    // Si el link es relativo (empieza con //), le ponemos https:
                    if (streamUrl.startsWith('//')) streamUrl = 'https:' + streamUrl;

                    player.src({ type: 'application/x-mpegURL', src: streamUrl });
                    player.play();
                    log.innerText = "✅ Señal encontrada. Cargando video...";
                    exito = true;
                    break; // Salimos del bucle de proxies si funciona
                }
            } catch (err) {
                console.error("Error con proxy:", proxy, err);
            }
        }

        if (!exito) {
            log.innerText = "❌ No se pudo extraer la señal. El sitio de deportes podría estar caído o bloqueado.";
        }
    }
</script>
</body>
</html>
