<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>FlixCr Pro - Smart Focus</title>
  <style>
    :root { --bg: #000; --accent: #00a2ff; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: sans-serif; }
    #main-app { display: flex; flex-direction: column; height: 100vh; }
    
    #video-container { 
      flex: 1; 
      background: #000; 
      position: relative;
    }

    /* El Iframe se carga con permisos de Popup para que el botón de Play no se bloquee */
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      background: #000;
    }

    #controls { 
      background: #0f1117; padding: 15px; border-top: 1px solid #222; 
      display: flex; gap: 10px; z-index: 100; 
    }

    select { flex: 1; background: #1a1d24; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 6px; font-size: 1rem; }
    button { background: var(--accent); color: #fff; border: none; padding: 0 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    
    #status { 
      position: absolute; top: 10px; left: 10px; font-size: 11px; 
      color: #00ff00; z-index: 110; background: rgba(0,0,0,0.8); 
      padding: 4px 8px; border-radius: 4px; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="main-app">
  <div id="status">MODO INTELIGENTE: El Play ya no se bloquea</div>
  <div id="video-container">
    <iframe id="main-player" 
            allow="autoplay; fullscreen" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            src=""></iframe>
  </div>

  <div id="controls">
    <select id="canal-select">
      <option value="https://la14hd.com/vivo/canal.php?stream=dsports">DIRECTV SPORTS</option>
      <option value="https://la14hd.com/vivo/canal.php?stream=tyc">TYC SPORTS</option>
      <option value="https://la14hd.com/vivo/canal.php?stream=espnpremium">ESPN PREMIUM</option>
      <option value="https://la14hd.com/vivo/canal.php?stream=foxsports2">FOX SPORTS 2</option>
    </select>
    <button onclick="reproducir()">CARGAR</button>
  </div>
</div>

<script>
  const player = document.getElementById('main-player');
  const status = document.getElementById('status');

  function reproducir() {
    const url = document.getElementById('canal-select').value;
    status.innerText = "SINTONIZANDO... Dale Play al video.";
    player.src = "about:blank";
    
    setTimeout(() => {
      player.src = url;
    }, 200);
  }

  // TRUCO DE FOCO: Cuando el navegador intente irse a la publicidad, 
  // forzamos el regreso a nuestra app.
  window.addEventListener('blur', function() {
    status.innerText = "🔄 PUBLICIDAD DETECTADA: Reenfocando...";
    
    // Pequeño delay para dejar que la pestaña se abra atrás
    setTimeout(() => {
        window.focus();
        status.innerText = "✅ SEÑAL RECUPERADA";
    }, 500);
  });
</script>
</body>
</html>
