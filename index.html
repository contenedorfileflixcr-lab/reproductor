<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>FlixCr Pro TV</title>
  <style>
    :root { --bg: #000; --accent: #00a2ff; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
    #main-app { display: flex; flex-direction: column; height: 100vh; }
    
    /* Contenedor de Video */
    #video-container {
      flex: 1;
      background: #000;
      position: relative;
    }

    /* Iframe maximizado */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    /* Panel de controles inferior */
    #controls {
      background: #0f1117;
      padding: 15px;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
    }

    select {
      flex: 1;
      background: #1a1d24;
      color: #fff;
      border: 1px solid #333;
      padding: 12px;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0 25px;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
    }

    #status {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 10px;
      color: var(--accent);
      background: rgba(0,0,0,0.5);
      padding: 2px 5px;
    }
  </style>
</head>
<body>

<div id="main-app">
  <div id="video-container">
    <div id="status">SISTEMA LISTO</div>
    <iframe id="player" 
            allow="autoplay; fullscreen" 
            sandbox="allow-scripts allow-same-origin allow-forms"
            src="about:blank"></iframe>
  </div>

  <div id="controls">
    <select id="canal-select">
      <optgroup label="DIRECTV SPORTS">
        <option value="https://elcanaldeportivo.com/directvsports.php">DSports Principal</option>
        <option value="https://la14hd.com/vivo/canal.php?stream=dsports">DSports Alterno</option>
      </optgroup>
      <optgroup label="ESPN / FOX">
        <option value="https://la14hd.com/vivo/canal.php?stream=espnpremium">ESPN Premium</option>
        <option value="https://la14hd.com/vivo/canal.php?stream=foxsports">Fox Sports</option>
      </optgroup>
      <optgroup label="OTROS">
        <option value="https://la14hd.com/vivo/canal.php?stream=tyc">TyC Sports</option>
        <option value="https://la14hd.com/vivo/canal.php?stream=tudn">TUDN</option>
      </optgroup>
    </select>
    <button onclick="reproducir()">Ver Ahora</button>
  </div>
</div>

<script>
  const player = document.getElementById('player');
  const status = document.getElementById('status');

  function reproducir() {
    const url = document.getElementById('canal-select').value;
    status.innerText = "CONECTANDO CON EL SERVIDOR...";
    
    // Limpiamos el iframe antes de cargar el nuevo para evitar ruidos de fondo
    player.src = "about:blank";
    
    setTimeout(() => {
      player.src = url;
      status.innerText = "SEÑAL ACTIVA - USA EL MANDO PARA PANTALLA COMPLETA";
    }, 100);
  }
</script>

</body>
</html>
