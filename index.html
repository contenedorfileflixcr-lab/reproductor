<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>FlixCr Pro TV - Native Player</title>
  <style>
    :root {
      --bg-dark: #000000;
      --accent: #00a2ff;
      --text: #ffffff;
    }

    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: sans-serif;
      overflow: hidden;
    }

    #main-app { display: flex; flex-direction: column; height: 100vh; }

    #video-container {
      flex: 1; 
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Video nativo ocupa todo el espacio */
    video {
      width: 100%;
      height: 100%;
      background: #000;
    }

    #controls-panel {
      background: rgba(15, 17, 23, 0.98);
      padding: 15px;
      border-top: 1px solid #222;
    }

    .selection-row { display: flex; gap: 10px; }

    select {
      flex: 1;
      background: #111;
      color: white;
      border: 1px solid #333;
      padding: 12px;
      border-radius: 6px;
      font-size: 16px;
    }

    .btn-play {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    #status-bar {
      background: #0a0a0a;
      color: #00a2ff;
      font-size: 12px;
      padding: 5px 15px;
      font-family: monospace;
    }
  </style>
</head>
<body>

<div id="main-app">
  <div id="status-bar">SISTEMA NATIVO LISTO</div>

  <div id="video-container">
    <video id="reproductor-pro" controls autoplay playsinline name="media"></video>
  </div>

  <div id="controls-panel">
    <div class="selection-row">
      <select id="stream-select">
        <option value="dsports">DIRECTV SPORTS</option>
        <option value="tudn">TUDN</option>
        <option value="foxsports">FOX SPORTS</option>
        <option value="espn">ESPN PREMIUM</option>
        <option value="tyc">TYC SPORTS</option>
      </select>
      <button id="play-btn" class="btn-play">REPRODUCIR</button>
    </div>
  </div>
</div>

<script>
  const WORKER_URL = "https://mi-motor-tv.contenedorfileflixcr.workers.dev/"; 
  const videoEl = document.getElementById('reproductor-pro');
  const statusBar = document.getElementById('status-bar');
  const playBtn = document.getElementById('play-btn');

  async function ejecutarCaptura() {
    const canal = document.getElementById('stream-select').value;
    
    statusBar.innerText = "🔍 SOLICITANDO TOKEN AL MOTOR...";
    playBtn.innerText = "Cargando...";

    try {
      // Llamamos al worker que tiene tu lógica de servidores
      const response = await fetch(`${WORKER_URL}?canal=${canal}`);
      const m3u8Real = await response.text();

      if (m3u8Real && m3u8Real !== "no_encontrado" && m3u8Real.includes("http")) {
        statusBar.innerText = "✅ SEÑAL RECIBIDA. INICIANDO...";
        
        // Carga directa en el elemento de video nativo
        videoEl.src = m3u8Real;
        videoEl.load();
        videoEl.play().catch(err => {
            statusBar.innerText = "⚠️ PRESIONA PLAY EN EL VIDEO";
        });

      } else {
        statusBar.innerText = "❌ ERROR: EL MOTOR NO OBTUVO EL LINK.";
      }
    } catch (e) {
      statusBar.innerText = "❌ ERROR DE CONEXIÓN.";
    } finally {
      playBtn.innerText = "REPRODUCIR";
    }
  }

  playBtn.onclick = ejecutarCaptura;
</script>

</body>
</html>
