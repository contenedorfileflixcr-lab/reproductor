<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>FlixCr Pro TV</title>
  <style>
    :root { --bg: #000; --accent: #00a2ff; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: sans-serif; }
    
    #main-app { display: flex; flex-direction: column; height: 100vh; }
    
    /* Contenedor de Video: El truco es que el iframe sea más grande que la pantalla */
    #video-container { 
      flex: 1; 
      background: #000; 
      position: relative; 
      overflow: hidden; 
    }

    iframe { 
      position: absolute;
      top: 0; left: 0;
      width: 100%; 
      height: 100%; 
      border: none; 
      background: #000;
      z-index: 10;
    }

    /* CAPA DE DESBLOQUEO: Esta capa se pone encima solo al principio */
    #glass-shield {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.01); /* Casi invisible */
      z-index: 20;
      display: none;
      cursor: pointer;
    }

    #controls { 
      background: #0f1117; padding: 12px; border-top: 1px solid #222; 
      display: flex; gap: 8px; z-index: 100; 
    }

    select { flex: 1; background: #1a1d24; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 5px; font-size: 14px; }
    button { background: var(--accent); color: #fff; border: none; padding: 0 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    
    #status-msg { 
      position: absolute; top: 10px; left: 10px; font-size: 11px; 
      color: #00ff00; z-index: 30; background: rgba(0,0,0,0.7); 
      padding: 4px 8px; border-radius: 3px; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="main-app">
  <div id="video-container">
    <div id="status-msg">ESPERANDO CANAL...</div>
    <div id="glass-shield" onclick="cleanAds()"></div>
    <iframe id="main-iframe" allow="autoplay; fullscreen" src=""></iframe>
  </div>

  <div id="controls">
    <select id="canal-select">
      <option value="https://la14hd.com/vivo/canal.php?stream=dsports">DIRECTV SPORTS</option>
      <option value="https://la14hd.com/vivo/canal.php?stream=tyc">TYC SPORTS</option>
      <option value="https://la14hd.com/vivo/canal.php?stream=espnpremium">ESPN PREMIUM</option>
      <option value="https://la14hd.com/vivo/canal.php?stream=foxsports2">FOX SPORTS 2</option>
    </select>
    <button onclick="loadStream()">CARGAR</button>
  </div>
</div>

<script>
  const iframe = document.getElementById('main-iframe');
  const shield = document.getElementById('glass-shield');
  const status = document.getElementById('status-msg');

  function loadStream() {
    const url = document.getElementById('canal-select').value;
    status.innerText = "SINTONIZANDO... POR FAVOR ESPERA";
    
    // Limpieza
    iframe.src = "about:blank";
    shield.style.display = "none";

    setTimeout(() => {
      iframe.src = url;
      // Activamos el escudo 2 segundos después de cargar
      setTimeout(() => {
        shield.style.display = "block";
        status.innerText = "PRESIONA UNA VEZ EL VIDEO PARA LIMPIAR";
      }, 2000);
    }, 200);
  }

  function cleanAds() {
    // Al tocar el escudo, lo quitamos para que el siguiente clic vaya al Play
    shield.style.display = "none";
    status.innerText = "LISTO: DALE PLAY AL VIDEO";
  }
</script>
</body>
</html>
