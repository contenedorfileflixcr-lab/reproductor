<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador Directo v3</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; padding: 20px; }
        button { padding: 15px; background: #222; color: #fff; border: 2px solid #444; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:active { background: #ff0000; }
        #status { color: #00ff00; background: #111; padding: 10px; margin: 10px; border-radius: 5px; font-family: monospace; }
        .video-js { margin: 0 auto; width: 100%; max-width: 800px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="status">SISTEMA LISTO: Esperando comando...</div>

    <div class="grid">
        <button onclick="scrapear('https://librefutboltv.su/home1/directv-sports/')">DIRECTV</button>
        <button onclick="scrapear('https://librefutboltv.su/home1/tudn/')">TUDN</button>
        <button onclick="scrapear('https://librefutboltv.su/home1/fox-sports/')">FOX SPORTS</button>
        <button onclick="scrapear('https://librefutboltv.su/home1/espn-premium/')">ESPN PREMIUM</button>
        <button onclick="scrapear('https://librefutboltv.su/home1/tyc-sports/')">TYC SPORTS</button>
    </div>

    <video id="player" class="video-js vjs-16-9 vjs-big-play-centered" controls preload="auto"></video>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    const player = videojs('player');
    const status = document.getElementById('status');

    async function scrapear(targetUrl) {
        status.innerText = "📡 ACCEDIENDO A LA FUENTE...";
        player.pause();

        // Probamos con un proxy diferente (CORS-Proxy.io) que es más rápido para TVs
        const proxy = "https://corsproxy.io/?" + encodeURIComponent(targetUrl);

        try {
            const response = await fetch(proxy);
            if (!response.ok) throw new Error("Proxy denegado");
            
            const html = await response.text();
            
            // Buscamos el link m3u8 tal como hacía tu script de Python
            // Esta regex es más potente: busca cadenas que terminan en .m3u8 pero ignorando carácteres basura
            const m3u8Regex = /https?:\/\/[^"']+\.m3u8[^"']*/;
            const match = html.match(m3u8Regex);

            if (match) {
                let cleanUrl = match[0].replace(/\\/g, ""); // Limpia barras inclinadas si vienen del JSON
                status.innerText = "🎯 ¡LINK CAPTURADO! Cargando buffer...";
                
                player.src({ type: 'application/x-mpegURL', src: cleanUrl });
                player.play();
            } else {
                status.innerText = "⚠️ CÓDIGO LEÍDO, PERO NO SE HALLÓ M3U8. Intenta otro canal.";
            }
        } catch (e) {
            status.innerText = "❌ ERROR DE PUENTE: Intentando método alternativo...";
            // Reintento automático con AllOrigins si el primero falla
            try {
                const altProxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl);
                const resAlt = await fetch(altProxy);
                const jsonAlt = await resAlt.json();
                const matchAlt = jsonAlt.contents.match(/https?:\/\/[^"']+\.m3u8[^"']*/);
                if (matchAlt) {
                    player.src({ type: 'application/x-mpegURL', src: matchAlt[0].replace(/\\/g, "") });
                    player.play();
                    status.innerText = "✅ SEÑAL RECUPERADA (Vía Alt).";
                }
            } catch (e2) {
                status.innerText = "🚫 BLOQUEO TOTAL: El sitio de deportes rechaza la conexión.";
            }
        }
    }
</script>
</body>
</html>
