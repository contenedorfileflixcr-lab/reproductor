<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>FlixCr Pro TV - Iframe Mode</title>
  <style>
    :root { --bg-dark: #000; --accent: #00a2ff; --text: #fff; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-dark); color: var(--text); font-family: sans-serif; overflow: hidden; }
    #main-app { display: flex; flex-direction: column; height: 100vh; }
    
    #video-container {
      flex: 1;
      position: relative;
      background: #000;
    }

    /* El Iframe ocupará todo el espacio y "pateará" la publicidad hacia afuera */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    #controls-panel {
      background: rgba(15, 17, 23, 0.98);
      padding: 15px;
      border-top: 1px solid #222;
    }

    .selection-row { display: flex; gap: 10px; }
    select { flex: 1; background: #111; color: white; border: 1px solid #333; padding: 12px; border-radius: 6px; font-size: 16px; }
    .btn-play { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    #status-bar { background: #0a0a0a; color: #00a2ff; font-size: 11px; padding: 5px 15px; font-family: monospace; }
  </style>
</head>
<body>

<div id="main-app">
  <div id="status-bar">MODO IFRAME ACTIVO</div>

  <div id="video-container">
    <iframe id="reproductor-iframe" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>

  <div id="controls-panel">
    <div class="selection-row">
      <select id="stream-select">
        <option value="https://elcanaldeportivo.com/directvsports.php">DIRECTV SPORTS</option>
        <option value="https://la14hd.com/vivo/canal.php?stream=tudn">TUDN</option>
        <option value="https://elcanaldeportivo.com/foxsports.php">FOX SPORTS</option>
        <option value="https://la14hd.com/vivo/canal.php?stream=espnpremium">ESPN PREMIUM</option>
        <option value="https://la14hd.com/vivo/canal.php?stream=tyc">TYC SPORTS</option>
      </select>
      <button id="play-btn" class="btn-play">REPRODUCIR</button>
    </div>
  </div>
</div>

<script>
  const iframeEl = document.getElementById('reproductor-iframe');
  const statusBar = document.getElementById('status-bar');
  const playBtn = document.getElementById('play-btn');

  function cargarCanal() {
    const url = document.getElementById('stream-select').value;
    statusBar.innerText = "⏳ CARGANDO SEÑAL DIRECTA...";
    
    // Al usar un iframe directo a los servidores de tu script, 
    // evitamos el error de "token" porque el servidor lo genera él mismo.
    iframeEl.src = url;
    
    // Intentamos forzar el play tras un momento
    setTimeout(() => {
      statusBar.innerText = "✅ REPRODUCIENDO (Usa el control de la TV para pantalla completa)";
    }, 2000);
  }

  playBtn.onclick = cargarCanal;
</script>

</body>
</html>
